name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
            name: 'macOS-arm64'
          
          # macOS Intel
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
            name: 'macOS-x64'
          
          # Linux
          - platform: 'ubuntu-22.04'
            args: ''
            target: 'x86_64-unknown-linux-gnu'
            name: 'Linux-x64'
          
          # Windows
          - platform: 'windows-latest'
            args: ''
            target: 'x86_64-pc-windows-msvc'
            name: 'Windows-x64'

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install cmake

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            cmake \
            pkg-config

      - name: Install dependencies (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          choco install cmake

      - name: Install frontend dependencies
        run: npm install
        working-directory: kafkit

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: kafkit
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Kafkit ${{ github.ref_name }}'
          releaseBody: |
            ## 下载
            
            ### macOS
            - Apple Silicon (M1/M2/M3): `Kafkit_*_aarch64.dmg`
            - Intel: `Kafkit_*_x64.dmg`
            
            ### Linux
            - Ubuntu/Debian: `kafkit_*_amd64.deb`
            - Fedora/RHEL: `kafkit-*.x86_64.rpm`
            
            ### Windows
            - Installer: `Kafkit_*_x64-setup.exe`
            - MSI: `Kafkit_*_x64_en-US.msi`
            
            ## 系统要求
            - macOS 11.0+
            - Linux: Ubuntu 20.04+ / Fedora 35+ (glibc 2.17+)
            - Windows 10 1809+ / Windows 11
            
            ## 功能特性
            - ✅ Kafka 连接管理 (PLAINTEXT/SSL/SASL)
            - ✅ Topic 浏览与详情查看
            - ✅ 分区、副本、ISR、Offset 信息
            - ✅ 无需额外依赖，开箱即用
          releaseDraft: true
          prerelease: false
